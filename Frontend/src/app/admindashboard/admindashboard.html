<div class="d-flex" id="wrapper">
  <div id="page-content-wrapper" class="w-100 bg-light-grey">
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom px-4 py-3">
      <h4 class="m-0 font-weight-bold">Analytics Overview</h4>
      <div class="ms-auto d-flex align-items-center">
        <span class="me-3 text-muted">Welcome, Admin</span>
        <img src="https://ui-avatars.com/api/?name=Admin&background=0D6EFD&color=fff" class="rounded-circle" width="35">
      </div>
    </nav>

    <div class="container-fluid p-4">
      <div class="row mb-4">
        <div class="col-md-3" *ngFor="let stat of stats">
          <div class="card stat-card border-0 shadow-sm">
            <div class="card-body">
              <h6 class="text-muted text-uppercase small">{{stat.title}}</h6>
              <h2 class="m-0 font-weight-bold">{{stat.value}}</h2>
              <div class="mt-2" [ngClass]="stat.isUp ? 'text-success' : 'text-danger'">
                <i [class]="stat.isUp ? 'bi bi-arrow-up' : 'bi bi-arrow-down'"></i> {{stat.percent}}%
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="card border-0 shadow-sm">
        <div class="card-header bg-white py-3">
          <h5 class="m-0">Active Examination Batches</h5>
        </div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover mb-0">
              <thead class="bg-light">
                <tr>
                  <th>Exam Name</th>
                  <th>Category</th>
                  <th>Date</th>
                  <th>Status</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let exam of exams">
                  <td><strong>{{exam.name}}</strong></td>
                  <td>{{exam.category}}</td>
                  <td>{{exam.date}}</td>
                  <td><span [class]="'badge rounded-pill ' + exam.statusClass">{{exam.status}}</span></td>
                  <td><button class="btn btn-sm btn-outline-primary">View Results</button></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="logoutModal" tabindex="-1" #logoutmodel>
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow">
      <div class="modal-body text-center p-5">
        <i class="bi bi-exclamation-circle text-warning display-1"></i>
        <h3 class="mt-4">Are you sure?</h3>
        <p class="text-muted">You will need to login again to access the dashboard.</p>
        <div class="mt-4">
          <button type="button" class="btn btn-light px-4 me-2" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary px-4" (click)="ConformLogout()">Yes, Logout</button>
        </div>
      </div>
    </div>
  </div>
</div>
