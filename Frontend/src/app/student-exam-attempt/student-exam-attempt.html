<div class="container mt-4">
  <h3 class="mb-4 text-primary">
    {{ examData?.title }}
  </h3>

  <p class="text-muted">
    {{ examData?.description }}
  </p>

  <div class="alert alert-warning">⏱ Time Remaining: {{ examData?.remainingSeconds }} seconds</div>

  @for (q of examData?.questions; track q.examQuestionId) {
    <div class="card mb-4 shadow-sm">
      <div class="card-body">
        <h6 class="fw-bold">Question {{ q.questionNo }}</h6>

        <p>{{ q.question }}</p>

        @for (opt of q.options; track opt.optionId) {
          <div class="form-check">
            <input
              class="form-check-input"
              type="radio"
              name="q{{ q.questionNo }}"
              [value]="opt.optionId"
              (change)="selectAnswer(q.examQuestionId, opt.optionId)"
            />

            <label class="form-check-label"> {{ opt.optionId }}. {{ opt.text }} </label>
          </div>
        }
      </div>
    </div>
  }
  <button class="btn btn-success" (click)="SubmitExam(examData.examId)">Submit Exam</button>
</div>
